<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chartera — Singapore Maritime Week 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1829;
    --gold: #C4963A;
    --gold-light: #E2B860;
    --white: #FFFFFF;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
    --card-hover: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% -5%, rgba(196,150,58,0.14) 0%, transparent 65%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
    pointer-events: none;
  }

  .compass {
    position: fixed;
    bottom: -100px;
    right: -100px;
    width: 320px;
    height: 320px;
    opacity: 0.045;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ─── Logo / Identity ─── */
  .identity {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
  }

  .logo-img {
    width: 160px;
    margin: 0 auto 10px;
    display: block;
  }

  .identity p {
    font-size: 13.5px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
  }

  /* ─── Links ─── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.5s ease both;
  }

  .link-card:nth-child(1) { animation-delay: 0.05s; }
  .link-card:nth-child(2) { animation-delay: 0.1s; }
  .link-card:nth-child(3) { animation-delay: 0.15s; }
  .link-card:nth-child(4) { animation-delay: 0.2s; }

  .link-card:hover {
    background: var(--card-hover);
    border-color: rgba(196,150,58,0.4);
    transform: translateY(-1px);
  }

  .link-card:active { transform: scale(0.98); }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .link-icon svg { width: 20px; height: 20px; }

  .icon-web  { background: rgba(196,150,58,0.15); }
  .icon-web svg { stroke: var(--gold-light); fill: none; }

  .icon-li   { background: rgba(10,102,194,0.2); }
  .icon-li svg { fill: #5BA4CF; }

  .icon-mail { background: rgba(255,255,255,0.08); }
  .icon-mail svg { stroke: rgba(255,255,255,0.7); fill: none; }

  .icon-form { background: rgba(196,150,58,0.2); }
  .icon-form svg { stroke: var(--gold-light); fill: none; }

  .link-text { flex: 1; }

  .link-text strong {
    display: block;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 2px;
  }

  .link-text span {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  .link-arrow {
    color: rgba(255,255,255,0.25);
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .link-card:hover .link-arrow {
    color: var(--gold-light);
    transform: translateX(2px);
  }

  /* ─── Footer ─── */
  .footer {
    margin-top: 36px;
    font-size: 11px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.05em;
    text-align: center;
    animation: fadeUp 0.5s 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
