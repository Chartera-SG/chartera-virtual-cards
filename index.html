<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chartera — Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0b1628;
      --navy-mid: #12213d;
      --navy-light: #1c3055;
      --accent: #2dd4bf;
      --accent-soft: rgba(45,212,191,0.12);
      --white: #f5f8ff;
      --muted: #7a93b8;
      --border: rgba(45,212,191,0.15);
    }
    html, body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      padding: 40px 24px;
    }
    .container { width: 100%; max-width: 440px; }
    .brand {
      text-align: center;
      margin-bottom: 40px;
      animation: rise 0.5s ease both;
    }
    .brand-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(45,212,191,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--white);
      margin-bottom: 6px;
    }
    .subtitle { font-size: 13px; color: var(--muted); }
    .team { display: flex; flex-direction: column; gap: 12px; }
    .member {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--white);
      transition: all 0.2s ease;
      animation: rise 0.6s ease both;
    }
    .member:nth-child(1) { animation-delay: 0.1s; }
    .member:nth-child(2) { animation-delay: 0.2s; }
    .member:nth-child(3) { animation-delay: 0.3s; }
    .member:hover {
      background: var(--navy-light);
      border-color: rgba(45,212,191,0.35);
      transform: translateX(4px);
    }
    .avatar {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--navy-light), var(--accent-soft));
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .info { flex: 1; }
    .member-name { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
    .member-title { font-size: 12px; color: var(--muted); }
    .arrow { color: var(--muted); font-size: 18px; }
    @keyframes rise { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-tag"><span class="dot"></span> Chartera</div>
      <h1>Meet the Team</h1>
      <p class="subtitle">Maritime Voyage Execution System</p>
    </div>

    <div class="team">
      <a class="member" href="jack.html">
        <div class="avatar">J</div>
        <div class="info">
          <div class="member-name">Jack Lee</div>
          <div class="member-title">Co-founder</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member" href="dhruv.html">
        <div class="avatar">D</div>
        <div class="info">
          <div class="member-name">Dhruv Verma</div>
          <div class="member-title">Co-founder</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="member" href="arihant.html">
        <div class="avatar">A</div>
        <div class="info">
          <div class="member-name">Arihant Jain</div>
          <div class="member-title">Co-founder</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <div class="footer">
      <a href="https://www.chartera.io">chartera.io</a> · Singapore
    </div>
  </div>
</body>
</html>
